<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo Hello</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 24px;
        line-height: 1.4;
      }
      .card {
        max-width: 520px;
        padding: 16px;
        border: 1px solid rgba(127, 127, 127, 0.35);
        border-radius: 12px;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      input {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(127, 127, 127, 0.35);
        min-width: 220px;
      }
      button {
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(127, 127, 127, 0.35);
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      #result {
        margin-top: 14px;
        padding: 12px;
        border-radius: 10px;
        background: rgba(127, 127, 127, 0.12);
        white-space: pre-wrap;
      }
      .muted {
        opacity: 0.75;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 style="margin: 0 0 10px">Frontend</h1>
      <p class="muted" style="margin: 0 0 14px">
        Tombol 1: tampilkan Hello World. Di bawahnya: input nama + tombol submit untuk Hello nama.
      </p>

      <div class="row">
        <button id="btnHelloWorld" type="button">Tampilkan Hello World</button>
      </div>

      <hr style="margin: 16px 0; border: 0; border-top: 1px solid rgba(127, 127, 127, 0.25)" />

      <form id="helloForm" class="row" autocomplete="off">
        <input id="nameInput" name="name" placeholder="Masukkan nama..." />
        <button id="btnSubmitHello" type="submit">Submit</button>
      </form>

      <div id="result" aria-live="polite">Hasil akan tampil di sini.</div>
      <p class="muted" style="margin: 10px 0 0">
        API default: origin halaman ini (fallback ke <code>https://coba-code.vercel.app</code>), bisa diubah via
        <code>?api=...</code>
      </p>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
